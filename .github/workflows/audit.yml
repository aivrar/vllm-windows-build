name: Windows audit

on:
  push:
  pull_request:

jobs:
  contracts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Compile maintained Python files
        run: >-
          python -m py_compile
          verify_artifact.py verify_install.py engine_dispatcher.py
          vllm_launcher.py assemble_wheel_cu128_v0.25.1.py
          tests/test_verify_artifact.py tests/test_bootstrap_helpers.py
          tests/test_engine_dispatcher.py
          tests/test_release_contract.py tests/test_wheel_contents.py
          tests/test_windows_kv_offload.py tests/test_windows_kv_tiering.py
          tests/test_v19.py
      - name: Run pure regression suite
        run: >-
          python -m unittest
          tests.test_verify_artifact tests.test_bootstrap_helpers
          tests.test_engine_dispatcher
          tests.test_release_contract -v
      - name: Validate patch against upstream v0.25.1
        shell: pwsh
        run: |
          git clone --depth 1 --branch v0.25.1 https://github.com/vllm-project/vllm.git patch-check
          git -C patch-check apply --check ../vllm-windows-v9.patch
